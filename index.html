<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Treinamento Monitor.IA — Acesso restrito</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--teal:#0E7C8B;--teal-deep:#0A5560;--teal-soft:#E2F4F6;--ink:#1B1530;--ink-soft:#4A4458;--muted:#837C92;--surface:#fff;--border:#E8E2D5;--border-strong:#D7CFBE;--red-soft:#FEE2E2;}
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;font-family:'Manrope',system-ui,-apple-system,sans-serif;background:linear-gradient(168deg,#E2F4F6 0%,#FAF8F3 56%);min-height:100vh;display:grid;place-items:center;color:var(--ink);padding:20px;}
  .gate{width:min(92vw,420px);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:38px 32px 30px;box-shadow:0 22px 64px rgba(10,85,96,.14);text-align:center;}
  .gate img{width:66px;height:66px;margin:0 auto 16px;display:block}
  .eyebrow{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--teal);font-weight:800}
  .gate h1{font-family:'Fraunces',Georgia,serif;font-size:25px;font-weight:700;margin:6px 0 4px}
  .gate p{font-size:13.5px;color:var(--ink-soft);margin:0 0 20px;line-height:1.5}
  .err{color:#7F1D1D;background:var(--red-soft);border-radius:10px;padding:9px 12px;font-size:13px;margin-bottom:12px;display:none}
  .err.show{display:block}
  .field{margin-bottom:12px}
  input{width:100%;padding:13px 14px;border:1px solid var(--border-strong);border-radius:12px;font-size:15px;font-family:inherit;background:#FCFAF6;color:var(--ink)}
  input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
  button{width:100%;padding:13px;border:0;border-radius:999px;background:var(--teal);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
  button:hover{background:var(--teal-deep)} button:disabled{opacity:.65;cursor:default}
  .lock{font-size:12px;color:var(--muted);margin-top:18px}
</style></head>

    function b2u(b64){var bin=atob(b64),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
    async function unlock(pw){
      var enc=new TextEncoder();
      var bk=await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
      var key=await crypto.subtle.deriveKey({name:'PBKDF2', salt:b2u(DATA.salt), iterations:DATA.iter, hash:'SHA-256'}, bk, {name:'AES-GCM', length:256}, false, ['decrypt']);
      var buf=await crypto.subtle.decrypt({name:'AES-GCM', iv:b2u(DATA.iv)}, key, b2u(DATA.ct));
      return new TextDecoder().decode(buf);
    }
    var f=document.getElementById('gate'), btn=document.getElementById('btn'), err=document.getElementById('err'), pw=document.getElementById('pw');
    f.addEventListener('submit', async function(e){
      e.preventDefault(); err.classList.remove('show'); btn.disabled=true; btn.textContent='Abrindo…';
      try{ var html=await unlock(pw.value); document.open(); document.write(html); document.close(); }
      catch(ex){ btn.disabled=false; btn.textContent='Entrar'; err.classList.add('show'); pw.value=''; pw.focus(); }
    });
